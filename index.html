<!DOCTYPE html>
<html>
<head>
<title>Padel Tracker</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
}

input{
padding:8px;
margin:5px;
width:90%;
}

button{
padding:10px;
margin:5px;
}

.section{
margin-top:30px;
}
</style>

</head>

<body>

<h2>Padel Match Tracker</h2>

<div class="section">

<h3>Enter Match</h3>

<b>Team A</b><br>
<input id="a1" placeholder="Player 1"><br>
<input id="a2" placeholder="Player 2"><br>

<b>Team B</b><br>
<input id="b1" placeholder="Player 3"><br>
<input id="b2" placeholder="Player 4"><br>

<input id="score" placeholder="Score (eg 6-4 7-5)"><br>

<button onclick="recordMatch()">Record Match</button>
<button onclick="undoMatch()">Undo Last Match</button>

</div>

<div class="section">
<h3>Player Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<div class="section">
<h3>Most Successful Pairs (min 3 matches)</h3>
<div id="pairs"></div>
</div>

<div class="section">
<h3>Match History</h3>
<div id="history"></div>
</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyDqUDIfqas8BKyo9gVapyl05vjvsZ4Qcig",
  authDomain: "padel-tracker-ebbec.firebaseapp.com",
  projectId: "padel-tracker-ebbec",
  storageBucket: "padel-tracker-ebbec.firebasestorage.app",
  messagingSenderId: "76662388907",
  appId: "1:76662388907:web:ddb98020225eb6aec9dfee"
};

firebase.initializeApp(firebaseConfig)
const db = firebase.firestore()

function recordMatch(){

let a1=document.getElementById("a1").value
let a2=document.getElementById("a2").value
let b1=document.getElementById("b1").value
let b2=document.getElementById("b2").value
let score=document.getElementById("score").value

let teamA=[a1,a2]
let teamB=[b1,b2]

let sets=score.split(" ")

let winsA=0
let winsB=0

sets.forEach(s=>{
let parts=s.split("-")
if(Number(parts[0])>Number(parts[1])) winsA++
else winsB++
})

let winner = winsA>winsB ? "A":"B"

db.collection("matches").add({
teamA,
teamB,
score,
winner,
created:new Date()
})

}

function undoMatch(){

db.collection("matches")
.orderBy("created","desc")
.limit(1)
.get()
.then(snapshot=>{

snapshot.forEach(doc=>{
db.collection("matches").doc(doc.id).delete()
})

})

}

function loadMatches(){

db.collection("matches")
.orderBy("created")
.onSnapshot(snapshot=>{

let historyHTML=""
let playerStats={}
let pairStats={}

snapshot.forEach(doc=>{

let m=doc.data()

let teamA=m.teamA
let teamB=m.teamB

historyHTML+=`${teamA.join(" / ")} vs ${teamB.join(" / ")} — ${m.score}<br>`

teamA.concat(teamB).forEach(p=>{
if(!playerStats[p]) playerStats[p]={w:0,l:0}
})

if(m.winner==="A"){
teamA.forEach(p=>playerStats[p].w++)
teamB.forEach(p=>playerStats[p].l++)
}else{
teamB.forEach(p=>playerStats[p].w++)
teamA.forEach(p=>playerStats[p].l++)
}

let pairA=teamA.join(" / ")
let pairB=teamB.join(" / ")

if(!pairStats[pairA]) pairStats[pairA]={w:0,l:0}
if(!pairStats[pairB]) pairStats[pairB]={w:0,l:0}

if(m.winner==="A"){
pairStats[pairA].w++
pairStats[pairB].l++
}else{
pairStats[pairB].w++
pairStats[pairA].l++
}

})

document.getElementById("history").innerHTML=historyHTML

// PLAYER LEADERBOARD

let players=Object.keys(playerStats).map(p=>{

let w=playerStats[p].w
let l=playerStats[p].l
let matches=w+l
let pct=matches ? w/matches : 0

return {name:p,w,l,matches,pct}

})

players.sort((a,b)=>b.pct-a.pct)

let leaderboardHTML = `
<table border="1" cellpadding="6" style="border-collapse:collapse;width:100%">
<tr>
<th>Player</th>
<th>Wins</th>
<th>Losses</th>
<th>Matches</th>
<th>Win %</th>
</tr>
`

players.forEach(p=>{
leaderboardHTML += `
<tr>
<td>${p.name}</td>
<td>${p.w}</td>
<td>${p.l}</td>
<td>${p.matches}</td>
<td>${(p.pct*100).toFixed(0)}%</td>
</tr>
`
})

leaderboardHTML += "</table>"
// PAIRS LEADERBOARD

let pairs=Object.keys(pairStats).map(pair=>{

let w=pairStats[pair].w
let l=pairStats[pair].l
let matches=w+l
let pct=matches ? w/matches : 0

return {pair,w,l,matches,pct}

})
.filter(p=>p.matches>=3)

pairs.sort((a,b)=>b.pct-a.pct)

let pairsHTML = `
<table border="1" cellpadding="6" style="border-collapse:collapse;width:100%">
<tr>
<th>Pair</th>
<th>Wins</th>
<th>Losses</th>
<th>Matches</th>
<th>Win %</th>
</tr>
`

pairs.forEach(p=>{
pairsHTML += `
<tr>
<td>${p.pair}</td>
<td>${p.w}</td>
<td>${p.l}</td>
<td>${p.matches}</td>
<td>${(p.pct*100).toFixed(0)}%</td>
</tr>
`
})

pairsHTML += "</table>"

document.getElementById("pairs").innerHTML=pairsHTML

})

}

loadMatches()

</script>

</body>
</html>
