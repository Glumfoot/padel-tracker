<!DOCTYPE html>
<html>
<head>
<title>Padel Tracker</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
}

input{
padding:8px;
margin:5px;
width:90%;
}

button{
padding:10px;
margin:5px;
}

.section{
margin-top:30px;
}
</style>

</head>

<body>

<h2>Padel Match Tracker</h2>

<div class="section">

<h3>Enter Match</h3>

<input id="teamA" placeholder="Team A (Player1 / Player2)">
<br>

<input id="teamB" placeholder="Team B (Player3 / Player4)">
<br>

<input id="score" placeholder="Score (eg 6-4 7-5)">
<br>

<button onclick="recordMatch()">Record Match</button>
<button onclick="undoMatch()">Undo Last Match</button>

</div>

<div class="section">

<h3>Player Leaderboard</h3>
<div id="leaderboard"></div>

</div>

<div class="section">

<h3>Best Pairs</h3>
<div id="pairs"></div>

</div>

<div class="section">

<h3>Match History</h3>
<div id="history"></div>

</div>

<script>

// PASTE YOUR FIREBASE CONFIG HERE

const firebaseConfig = {
  apiKey: "AIzaSyDqUDIfqas8BKyo9gVapyl05vjvsZ4Qcig",
  authDomain: "padel-tracker-ebbec.firebaseapp.com",
  projectId: "padel-tracker-ebbec",
  storageBucket: "padel-tracker-ebbec.firebasestorage.app",
  messagingSenderId: "76662388907",
  appId: "1:76662388907:web:ddb98020225eb6aec9dfee"
};

firebase.initializeApp(firebaseConfig)

const db = firebase.firestore()

function recordMatch(){

let teamA = document.getElementById("teamA").value
let teamB = document.getElementById("teamB").value
let score = document.getElementById("score").value

let winner = ""

let sets = score.split(" ")

let winsA = 0
let winsB = 0

sets.forEach(s => {

let parts = s.split("-")

if(Number(parts[0]) > Number(parts[1])) winsA++
else winsB++

})

winner = winsA > winsB ? teamA : teamB

db.collection("matches").add({
teamA: teamA,
teamB: teamB,
score: score,
winner: winner,
created: new Date()
})

}

function undoMatch(){

db.collection("matches")
.orderBy("created","desc")
.limit(1)
.get()
.then(snapshot => {

snapshot.forEach(doc => {
db.collection("matches").doc(doc.id).delete()
})

})

}

function loadMatches(){

db.collection("matches")
.orderBy("created")
.onSnapshot(snapshot => {

let historyHTML = ""

let playerStats = {}
let pairStats = {}

snapshot.forEach(doc => {

let m = doc.data()

historyHTML += m.teamA + " vs " + m.teamB + " — " + m.score + "<br>"

let playersA = m.teamA.split(" / ")
let playersB = m.teamB.split(" / ")

playersA.concat(playersB).forEach(p=>{
if(!playerStats[p]) playerStats[p] = {w:0,l:0}
})

if(m.winner === m.teamA){

playersA.forEach(p=>playerStats[p].w++)
playersB.forEach(p=>playerStats[p].l++)

}else{

playersB.forEach(p=>playerStats[p].w++)
playersA.forEach(p=>playerStats[p].l++)

}

let pairA = m.teamA
let pairB = m.teamB

if(!pairStats[pairA]) pairStats[pairA] = {w:0,l:0}
if(!pairStats[pairB]) pairStats[pairB] = {w:0,l:0}

if(m.winner === pairA){

pairStats[pairA].w++
pairStats[pairB].l++

}else{

pairStats[pairB].w++
pairStats[pairA].l++

}

})

document.getElementById("history").innerHTML = historyHTML

let pairs = Object.keys(pairStats).map(pair=>{

let w = pairStats[pair].w
let l = pairStats[pair].l
let matches = w + l
let pct = matches ? w/matches : 0

return {pair,w,l,matches,pct}

})
.filter(p => p.matches >= 3)

playerArray.sort((a,b)=>b.pct-a.pct)

let leaderboardHTML = ""

playerArray.forEach(p=>{
leaderboardHTML += `${p.name} — ${p.w}W ${p.l}L (${(p.pct*100).toFixed(0)}%)<br>`
})

document.getElementById("leaderboard").innerHTML = leaderboardHTML

let playerArray = Object.keys(playerStats).map(p=>{
let w = playerStats[p].w
let l = playerStats[p].l
let matches = w + l
let pct = matches ? (w/matches) : 0
return {name:p,w,l,matches,pct}
})

pairArray.sort((a,b)=>b.pct-a.pct)

let pairsHTML = ""

pairArray.forEach(p=>{
pairsHTML += `${p.pair} — ${p.w}W ${p.l}L (${(p.pct*100).toFixed(0)}%)<br>`
})

document.getElementById("pairs").innerHTML = pairsHTML

})

}

loadMatches()

</script>

</body>
</html>
